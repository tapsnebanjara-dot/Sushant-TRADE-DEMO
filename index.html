<!DOCTYPE html>
<html>
<head>
    <title>Live REDZONE Trading Chart Demo</title>

    <style>
        body {
            margin: 0;
            background: #0d0f14;
            font-family: Arial;
            color: white;
            display: flex;
        }

        #chart {
            width: 75%;
            height: 100vh;
        }

        #panel {
            width: 25%;
            padding: 20px;
            background: #111418;
            border-left: 2px solid #222;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 22px;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        #upBtn {
            background: #00c851;
        }

        #downBtn {
            background: #ff4444;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }

        #balance {
            font-size: 26px;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <div id="chart"></div>

    <div id="panel">
        <div id="balance">Demo Balance: ₹ <span id="bal">10000</span></div>

        <h3>Amount</h3>
        <input id="amount" value="1000">

        <button id="upBtn" class="btn">UP ↑</button>
        <button id="downBtn" class="btn">DOWN ↓</button>

        <p id="status"></p>
    </div>

    <!-- TradingView Charting Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>

    <script>
        let startPrice = 5850;
        let currentPrice = startPrice;
        let chart;
        let series;
        let balance = 10000;

        // Initialize Chart
        function createChart() {
            chart = new TradingView.widget({
                autosize: true,
                symbol: "BINANCE:BTCUSDT",
                interval: "1",
                timezone: "Etc/UTC",
                theme: "dark",
                style: "1",
                locale: "en",
                toolbar_bg: "#000000",
                enable_publishing: false,
                allow_symbol_change: false,
                hide_top_toolbar: false,
                container_id: "chart"
            });
        }

        createChart();

        // Fake live price movement
        setInterval(() => {
            let change = (Math.random() - 0.5) * 10;
            currentPrice += change;

            window.currentMarketPrice = currentPrice;

        }, 1000);

        function trade(direction) {
            let amount = parseInt(document.getElementById("amount").value);
            let entry = currentPrice;

            document.getElementById("status").innerHTML =
                "Trade Placed (" + direction + ") at price: " + entry.toFixed(2);

            setTimeout(() => {
                let exitPrice = currentPrice;
                let win = false;

                if (direction === "UP" && exitPrice > entry) win = true;
                if (direction === "DOWN" && exitPrice < entry) win = true;

                if (win) {
                    balance += amount;
                    document.getElementById("status").innerHTML =
                        "<span style='color:#00ff6a'>You Won! Exit Price: " + exitPrice.toFixed(2) + "</span>";
                } else {
                    balance -= amount;
                    document.getElementById("status").innerHTML =
                        "<span style='color:#ff4444'>You Lost! Exit Price: " + exitPrice.toFixed(2) + "</span>";
                }

                document.getElementById("bal").innerText = balance;

            }, 3000); // trade duration
        }

        document.getElementById("upBtn").onclick = () => trade("UP");
        document.getElementById("downBtn").onclick = () => trade("DOWN");

    </script>

</body>
</html>
